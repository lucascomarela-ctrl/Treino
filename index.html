<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Treino · Lucas</title>
<style>
:root{
  --bg:#111310; --card:#1a1d19; --card2:#22261f; --line:#2e332a;
  --tx:#e8e6df; --dim:#9a9a8f; --faint:#6d6d62;
  --amber:#e8a13c; --green:#7fb069; --red:#e05c5c; --blue:#6da3c7;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{background:var(--bg);color:var(--tx);font:15px/1.45 -apple-system,"SF Pro Text",Segoe UI,Roboto,sans-serif;
  -webkit-text-size-adjust:100%;text-size-adjust:100%;overscroll-behavior:none}
.num{font-variant-numeric:tabular-nums}
.wrap{max-width:640px;margin:0 auto;padding:calc(14px + env(safe-area-inset-top)) 14px 90px}
h1{font-size:20px;font-weight:800}
.sub{color:var(--faint);font-size:12.5px;margin-top:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px}
.card b{font-size:14.5px}
.lbl{display:block;color:var(--dim);font-size:12px;margin:10px 0 4px}
/* 16px é o mínimo que o iOS aceita sem dar zoom automático ao focar o campo */
input,select{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--tx);padding:8px 10px;font-size:16px;appearance:none;-webkit-appearance:none}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--amber);outline-offset:1px}
.row{display:flex;gap:8px}
.row>*{flex:1}
button{background:var(--card2);border:1px solid var(--line);border-radius:10px;color:var(--tx);padding:9px 12px;font-size:14px;cursor:pointer}
.btn-p{background:var(--amber);border-color:var(--amber);color:#181510;font-weight:700}
.btn-g{background:transparent;border-color:var(--line);color:var(--dim)}
.btn-danger{background:transparent;border-color:#5a3030;color:var(--red);font-size:13px}
.chip{border-radius:999px;padding:6px 12px;font-size:13px;color:var(--dim)}
.chip.on{background:var(--amber);border-color:var(--amber);color:#181510;font-weight:700}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px}
.kpi .v{font-size:17px;font-weight:800}
.kpi .l{color:var(--faint);font-size:11px;margin-top:2px}
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(20,22,19,.96);backdrop-filter:blur(8px);border-top:1px solid var(--line);display:flex;padding-bottom:env(safe-area-inset-bottom)}
.nav button{flex:1;background:none;border:none;border-radius:0;color:var(--faint);font-size:11.5px;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav button.on{color:var(--amber)}
.nav .ic{font-size:19px;line-height:1}
.sess{border-top:1px solid var(--line);padding:11px 2px;cursor:pointer}
.sess:first-of-type{border-top:none}
.sess .t{display:flex;justify-content:space-between;align-items:baseline}
.sess .d{color:var(--dim);font-size:12.5px}
.set-line{color:var(--dim);font-size:13px;margin:2px 0 6px}
.exname{font-size:13.5px;font-weight:600;margin-top:6px}
.flash{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--amber);color:var(--tx);border-radius:999px;padding:8px 16px;font-size:13.5px;z-index:50;opacity:0;transition:opacity .25s;pointer-events:none;max-width:90vw}
.flash.on{opacity:1}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}
th{color:var(--faint);font-weight:600;text-align:left;padding:5px 4px;border-bottom:1px solid var(--line);font-size:11.5px}
td{padding:6px 4px;border-bottom:1px solid var(--line)}
.up{color:var(--green)}.down{color:var(--red)}
svg text{font-family:inherit}
.empty{border:1.5px dashed var(--line);border-radius:14px;padding:24px 16px;text-align:center;color:var(--dim);margin-top:14px}
.setrow{display:grid;grid-template-columns:1fr 1fr 44px 34px;gap:6px;margin-top:6px;align-items:center}
.chk-t{border-radius:10px;font-size:15px;padding:7px 0;background:var(--card2);color:var(--faint)}
.chk-t.on{background:#1e2f1c;border-color:var(--green);color:var(--green)}
.setrow.ok input{opacity:.5}
.progwrap{position:sticky;top:0;z-index:5;background:var(--bg);padding:10px 0 6px;margin-bottom:6px}
.progbar{height:8px;border-radius:99px;background:var(--card2);border:1px solid var(--line);overflow:hidden}
.progfill{height:100%;background:var(--green);border-radius:99px;transition:width .3s ease}
.proglbl{font-size:11.5px;color:var(--faint);margin-top:5px;display:flex;justify-content:space-between}
.card.done{border-color:#3c5a38;background:#171c15;padding:12px 14px}
.done-head{display:flex;align-items:center;gap:8px}
.done-head b{flex:1;font-size:14.5px}
.done-check{color:var(--green);font-size:15px}
.btn-edit{border:1px solid var(--line);background:transparent;color:var(--dim);border-radius:8px;font-size:12.5px;padding:5px 10px}
.done-sets{color:var(--dim);font-size:12.5px;margin-top:5px}
.btn-done{background:transparent;border-color:#3c5a38;color:var(--green);flex:1}
.xbtn{color:var(--red);border-color:transparent;background:none;font-size:16px;padding:4px}
.ref{color:var(--faint);font-size:12px;margin-top:3px}
.ref u{color:var(--dim);cursor:pointer;text-decoration-style:dotted}
.mask{position:fixed;inset:0;z-index:60;background:rgba(8,9,7,.72);-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;width:100%;max-width:420px;max-height:86vh;overflow:auto;
  box-shadow:0 18px 50px rgba(0,0,0,.55);animation:pop .18s ease-out}
@keyframes pop{from{opacity:0;transform:translateY(10px) scale(.97)}to{opacity:1;transform:none}}
.modal h2{font-size:18px;font-weight:800}
.modal .big{font-size:38px;line-height:1;text-align:center;margin:2px 0 8px}
.mrow{display:flex;justify-content:space-between;gap:10px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13.5px}
.mrow:last-of-type{border-bottom:none}
.mrow span:first-child{color:var(--dim)}
.pr{background:#2a2413;border:1px solid #5c4a1e;border-radius:10px;padding:8px 10px;margin-top:8px;font-size:12.5px;color:var(--amber)}
/* dashboard: cabeçalhos de seção recolhíveis */
.sec{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:24px 2px 0;padding:6px 0;cursor:pointer}
.sec-t{font-size:11.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.sec-s{color:var(--faint);font-size:11.5px;margin-top:2px}
.sec-c{color:var(--faint);font-size:19px;line-height:1;transition:transform .18s}
.sec-c.open{transform:rotate(90deg)}
.ch{display:flex;align-items:baseline;justify-content:space-between;gap:8px}
.tag{color:var(--faint);font-size:11.5px;text-align:right;white-space:nowrap}
.kpi .d{font-size:10px;margin-top:3px;white-space:nowrap;overflow:hidden}
.kpi .ctx{color:var(--faint)}
.gbar{display:grid;grid-template-columns:74px 1fr 54px 40px;gap:8px;align-items:center;margin-top:9px;font-size:12.5px}
.gbar .gn{color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gbar .gt{height:9px;border-radius:999px;background:var(--card2);overflow:hidden}
.gbar .gt i{display:block;height:100%;border-radius:999px}
.gbar .gv{text-align:right}
.gbar .gd{text-align:right;font-size:11px;color:var(--faint)}
.gbar .gd.up{color:var(--green)}
.gbar .gd.down{color:var(--red)}
@media(min-width:520px){.kpis{grid-template-columns:repeat(6,1fr)}}
@media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<nav class="nav" id="nav"></nav>
<div class="flash" id="flash"></div>
<div id="modal"></div>

<script>
"use strict";
/* ============================ util ============================ */
const $=(s,el=document)=>el.querySelector(s);
const DAY=864e5;
const todayISO=()=>{const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const isoD=t=>{const d=new Date(t);return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`};
const ts=iso=>new Date(iso+"T12:00:00").getTime();
const brDate=iso=>iso?`${iso.slice(8,10)}/${iso.slice(5,7)}/${iso.slice(2,4)}`:"—";
const fmt1=n=>n==null?"—":(Math.round(n*10)/10).toString().replace(".",",");
const fmtT=kg=>kg>=1000?fmt1(kg/1000)+" t":Math.round(kg)+" kg";
const uid=()=>Math.random().toString(36).slice(2,9);
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const e1rm=(c,r)=>r>0?c*(1+r/30):c;

/* nome de máquina: suprime especificações (ex.: "Amarelas") */
const normNome=n=>String(n||"")
  .replace(/\s*\bamarel[ao]s?\b/gi,"")
  .replace(/\s*\((?:amarel[ao]s?|pret[ao]s?|nova?s?|velha?s?)?\)/gi,"")
  .replace(/\s{2,}/g," ").trim();

let flashT=null;
function flash(msg){const f=$("#flash");f.textContent=msg;f.classList.add("on");clearTimeout(flashT);flashT=setTimeout(()=>f.classList.remove("on"),2200)}

/* ============================ trava de zoom ============================
   O iOS ignora user-scalable=no desde o iOS 10, então além do meta tag
   bloqueamos os gestos de pinça (eventos "gesture*", só do Safari) e o
   duplo-toque. touch-action:manipulation no CSS cobre o resto.          */
for(const ev of ["gesturestart","gesturechange","gestureend"])
  document.addEventListener(ev,e=>e.preventDefault(),{passive:false});
document.addEventListener("touchmove",e=>{if(e.touches.length>1)e.preventDefault()},{passive:false});
let lastTouch=0;
document.addEventListener("touchend",e=>{
  const t=Date.now();
  if(t-lastTouch<=320)e.preventDefault();   // duplo-toque
  lastTouch=t;
},{passive:false});

/* ============================ modal ============================
   confirm()/alert() nativos não funcionam em iframe sandbox — modal próprio. */
let MODAL=null;
function closeModal(){MODAL=null;$("#modal").innerHTML=""}
function openModal(html,acoes){
  MODAL={acoes};
  $("#modal").innerHTML=`<div class="mask" onclick="if(event.target===this)modalAcao(-1)">
    <div class="modal" role="dialog" aria-modal="true">${html}
      <div class="row" style="margin-top:14px">
        ${acoes.map((a,i)=>`<button class="${a.cls||"btn-g"}" onclick="modalAcao(${i})">${esc(a.label)}</button>`).join("")}
      </div>
    </div></div>`;
}
window.modalAcao=i=>{
  if(!MODAL)return;
  const a=i<0?MODAL.acoes.find(x=>x.esc):MODAL.acoes[i];
  closeModal();
  if(a&&a.fn)a.fn();
};

/* ============================ estado ============================ */
const KEY="gym-app-standalone-v1";
let DB={sessions:[],measures:[],plan:null};
try{const raw=localStorage.getItem(KEY);if(raw){const j=JSON.parse(raw);if(Array.isArray(j.sessions))DB=j}}catch(e){}
function persist(){try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){flash("Aviso: não consegui salvar no aparelho")}}
function normalizeAll(){for(const s of DB.sessions)for(const ex of (s.exercicios||[]))ex.nome=normNome(ex.nome)}
normalizeAll();

/* ==================== correção de dados (idempotente) ====================
   A planilha Treino.xlsx tem DOIS blocos com o título idêntico
   "Treino B: Coxa, Glúteo, Panturrilha" (mesociclo de abril e o atual, 3x20).
   Na importação original o bloco novo foi engolido pelo antigo e as sessões
   de perna do mesociclo atual nunca entraram. Reposto abaixo, direto da
   planilha. Roda uma vez por marcador; a checagem por id evita duplicar.   */
const mkSet=(c,r)=>({carga:c,reps:r,warm:false});
const PATCHES=[{
  id:"treinoB-mesociclo-3x20",
  aplicar(){
    const tem=d=>DB.sessions.some(s=>s.data===d&&/Treino B/i.test(s.treinoNome||""));
    const novas=[
      {id:"p2-65",data:"2026-06-06",academia:"Prime",treinoNome:"Treino B: Coxa, Glúteo, Panturrilha",exercicios:[
        {nome:"Stiff Halteres",tecnica:"",sets:[mkSet(30,20),mkSet(30,20),mkSet(30,25)]},
        {nome:"Cadeira Extensora",tecnica:"Strip-Set 3x",sets:[mkSet(55,20),mkSet(60,20),mkSet(60,20)]},
        {nome:"Cadeira Adutora",tecnica:"",sets:[mkSet(55,20),mkSet(55,20),mkSet(55,18)]},
        {nome:"Cadeira Abdutora",tecnica:"",sets:[mkSet(55,20),mkSet(55,20),mkSet(55,20)]},
        {nome:"Elevação Pélvica Máquina",tecnica:"",sets:[mkSet(80,20),mkSet(80,15),mkSet(80,15)]},
        {nome:"Gêmeos Em Pé Hack",tecnica:"GVT",sets:[mkSet(80,18)]}]},
      {id:"p2-66",data:"2026-06-16",academia:"Prime",treinoNome:"Treino B: Coxa, Glúteo, Panturrilha",exercicios:[
        {nome:"Stiff Halteres",tecnica:"",sets:[mkSet(30,20),mkSet(30,20),mkSet(30,20)]},
        {nome:"Cadeira Extensora",tecnica:"Strip-Set 3x",sets:[mkSet(60,20),mkSet(60,20),mkSet(60,20)]},
        {nome:"Cadeira Adutora",tecnica:"",sets:[mkSet(55,20),mkSet(55,20),mkSet(55,20)]},
        {nome:"Cadeira Abdutora",tecnica:"",sets:[mkSet(60,20),mkSet(60,20),mkSet(60,20)]},
        {nome:"Elevação Pélvica Máquina",tecnica:"",sets:[mkSet(80,20),mkSet(80,15),mkSet(80,20)]},
        {nome:"Gêmeos Em Pé Hack",tecnica:"GVT",sets:[mkSet(80,20)]}]}
    ].filter(s=>!DB.sessions.some(x=>x.id===s.id)&&!tem(s.data));
    if(novas.length)DB.sessions=[...novas,...DB.sessions];
    /* o Treino D do plano perdeu o último exercício da planilha (linha 211) */
    const tD=(DB.plan&&DB.plan.treinos||[]).find(t=>/Treino D/i.test(t.nome||""));
    if(tD&&Array.isArray(tD.exercicios)&&!tD.exercicios.some(e=>/flex[aã]o de punho/i.test(e.nome||""))){
      tD.exercicios.push({nome:"Flexão de Punho Barra Sentado",esquema:"10x20",tecnica:"GVT"});
    }
    return novas.length;
  }
}];
function aplicarPatches(){
  DB.patches=Array.isArray(DB.patches)?DB.patches:[];
  let mudou=false;
  for(const p of PATCHES){
    if(DB.patches.includes(p.id))continue;
    p.aplicar();DB.patches.push(p.id);mudou=true;
  }
  if(mudou){normalizeAll();try{localStorage.setItem(KEY,JSON.stringify(DB))}catch(e){}}
}
aplicarPatches();

/* academias para seleção: histórico menos Bodytech */
function gymOptions(){
  const cnt={};
  for(const s of DB.sessions)if(s.academia&&!/bodytech/i.test(s.academia))cnt[s.academia]=(cnt[s.academia]||0)+1;
  return Object.entries(cnt).sort((a,b)=>b[1]-a[1]).map(x=>x[0]);
}
const tonelagemSessao=s=>(s.exercicios||[]).reduce((a,ex)=>/\[barras\]/i.test(ex.nome)?a:a+(ex.sets||[]).reduce((b,x)=>x.warm?b:b+(Number(x.carga)||0)*(Number(x.reps)||0),0),0);

/* ============================ import / export ============================ */
function exportPayload(){return{app:"gym-tracker",exportedAt:new Date().toISOString(),sessions:DB.sessions,measures:DB.measures,plan:DB.plan,patches:DB.patches||[]}}
function download(name,text,type="application/json"){
  const blob=new Blob([text],{type});const url=URL.createObjectURL(blob);
  const a=document.createElement("a");a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}
async function importFile(file){
  try{
    let txt=await file.text();
    // Alguns backups (gerados via Python) usam NaN/Infinity, que não são JSON válido no navegador.
    txt=txt.replace(/\bNaN\b/g,"null").replace(/-?\bInfinity\b/g,"null");
    const j=JSON.parse(txt);
    const s=j.sessions||j.sessoes||j.sessoes_completas;
    const m=j.measures||j.medidas||j.medidas_completas;
    const p=j.plan||j.plano||j.plano_vigente;
    if(!Array.isArray(s)){flash("Arquivo inválido — esperava o backup .json do App");return}
    DB.sessions=s;
    if(Array.isArray(m))DB.measures=m;
    if(p)DB.plan=p;
    DB.patches=Array.isArray(j.patches)?j.patches:[];
    normalizeAll();aplicarPatches();persist();render();
    flash(`Backup importado ✓ (${DB.sessions.length} sessões${Array.isArray(m)?`, ${m.length} medidas`:""})`);
  }catch(e){flash("Não consegui ler esse arquivo .json")}
}
async function enviarParaClaude(){
  let code="";
  try{const r=await fetch(location.href);code=await r.text()}catch(e){}
  if(!code)code="<!DOCTYPE html>\n"+document.documentElement.outerHTML;
  const txt=
`Este arquivo contém o código-fonte completo do meu app de treino (HTML autônomo) e todos os meus dados. Use-o como base para os ajustes que eu pedir e devolva o HTML completo atualizado, mantendo o formato dos dados.

=== DADOS (backup JSON) ===
${JSON.stringify(exportPayload())}

=== CÓDIGO DO APP (HTML) ===
${code}`;
  const name=`treino-para-claude-${todayISO()}.txt`;
  try{
    const file=new File([txt],name,{type:"text/plain"});
    if(navigator.canShare&&navigator.canShare({files:[file]})){
      await navigator.share({files:[file],title:"Treino · código + dados"});
      flash("Compartilhado ✓ — anexe no chat do Claude");return;
    }
  }catch(e){if(e&&e.name==="AbortError")return}
  download(name,txt,"text/plain");
  flash("Arquivo gerado ✓ — anexe no chat do Claude");
}

/* ============================ gráficos SVG ============================ */
/* Escala com números redondos: evita eixos tipo 41,8 / 81,6 / 121,4.
   A faixa acompanha os dados (com folga de 8%), mas as linhas de grade
   caem só em valores "bonitos" dentro dela.                            */
function niceStep(x){const e=Math.pow(10,Math.floor(Math.log10(x)));const f=x/e;return (f<1.5?1:f<3?2:f<7?5:10)*e}
function scaleY(min,max,{zero=false,n=4}={}){
  if(!isFinite(min)||!isFinite(max))return{lo:0,hi:1,ticks:[0,1]};
  if(min===max){min-=1;max+=1}
  const folga=(max-min)*0.08;
  let lo=zero?Math.min(0,min):min-folga, hi=max+folga;
  if(hi<=lo)hi=lo+1;
  const step=niceStep((hi-lo)/Math.max(1,n-1));
  const ticks=[];
  for(let v=Math.ceil(lo/step-1e-9)*step;v<=hi+1e-9;v+=step)ticks.push(Math.round(v*1e6)/1e6);
  return{lo,hi,ticks};
}
/* xTime:true -> xs são timestamps e as séries usam [timestamp, y]:
   os intervalos sem treino aparecem como intervalo de verdade no eixo. */
function chart({w=400,h=190,pad={l:38,r:10,t:10,b:20},xs,series=[],bars=null,xLabels=null,yFmt=v=>Math.round(v),xTime=false}){
  const all=[...series.flatMap(s=>s.pts.map(p=>p[1])),...(bars?bars.vals:[])].filter(v=>v!=null&&isFinite(v));
  if(!all.length)return `<div class="sub">Sem dados no período.</div>`;
  const {lo:ymin,hi:ymax,ticks}=scaleY(Math.min(...all),Math.max(...all),{zero:!!bars});
  const xmin=xTime?Math.min(...xs):0, xmax=xTime?Math.max(...xs):Math.max(1,xs.length-1);
  const X=v=>pad.l+(xmax===xmin?0:((v-xmin)/(xmax-xmin))*(w-pad.l-pad.r));
  const Y=v=>pad.t+(1-(v-ymin)/(ymax-ymin))*(h-pad.t-pad.b);
  let out=`<svg viewBox="0 0 ${w} ${h}" style="width:100%;height:auto;display:block">`;
  for(const v of ticks){const y=Y(v);
    out+=`<line x1="${pad.l}" x2="${w-pad.r}" y1="${y}" y2="${y}" stroke="var(--line)" stroke-dasharray="3 3"/>`;
    out+=`<text x="${pad.l-5}" y="${y+3.4}" text-anchor="end" fill="var(--faint)" font-size="10">${esc(yFmt(v))}</text>`;}
  if(bars){const bw=Math.max(2.5,(w-pad.l-pad.r)/Math.max(1,xs.length)*0.6);
    bars.vals.forEach((v,i)=>{if(v==null)return;const y=Y(v),y0=Y(Math.max(0,ymin));
      out+=`<rect x="${X(i)-bw/2}" y="${Math.min(y,y0)}" width="${bw}" height="${Math.abs(y0-y)}" rx="1.5" fill="${bars.colors?bars.colors[i]:bars.color||"var(--amber)"}" opacity=".85"/>`;});}
  for(const s of series){
    const d=s.pts.filter(p=>p[1]!=null&&isFinite(p[1])).map((p,i)=>`${i?"L":"M"}${X(p[0])},${Y(p[1])}`).join("");
    if(d)out+=`<path d="${d}" fill="none" stroke="${s.color}" stroke-width="1.8"${s.dash?' stroke-dasharray="5 4"':""}/>`;
    if(s.dots)for(const p of s.pts)if(p[1]!=null&&isFinite(p[1]))out+=`<circle cx="${X(p[0])}" cy="${Y(p[1])}" r="2.2" fill="${s.color}"/>`;
  }
  /* rótulos do eixo X: o primeiro alinha à esquerda e o último à direita,
     senão sobram por fora do viewBox (era o "15/07/2…" cortado).         */
  const lab=(t,x,a)=>`<text x="${x}" y="${h-6}" text-anchor="${a}" fill="var(--faint)" font-size="10">${esc(t)}</text>`;
  if(xTime){
    const meses=(xmax-xmin)/DAY>420, n=3;
    const f=t=>{const d=new Date(t),dd=String(d.getDate()).padStart(2,"0"),mm=String(d.getMonth()+1).padStart(2,"0");
      return meses?`${mm}/${String(d.getFullYear()).slice(2)}`:`${dd}/${mm}`};
    for(let i=0;i<=n;i++){const v=xmin+(i/n)*(xmax-xmin);out+=lab(f(v),X(v),i===0?"start":i===n?"end":"middle")}
  }else{
    const lbls=xLabels||xs, step=Math.max(1,Math.ceil(lbls.length/5));
    lbls.forEach((lb,i)=>{if(i%step&&i!==lbls.length-1)return;
      out+=lab(lb,X(i),i===0?"start":i===lbls.length-1?"end":"middle")});
  }
  return out+"</svg>";
}

/* melhor e1RM histórico de um exercício, ignorando as sessões informadas */
function recordeE1rm(nome,excluirId){
  let best=0;
  for(const s of DB.sessions){
    if(s.id===excluirId)continue;
    for(const ex of (s.exercicios||[])){
      if(ex.nome!==nome)continue;
      for(const x of (ex.sets||[]))if(!x.warm)best=Math.max(best,e1rm(Number(x.carga)||0,Number(x.reps)||0));
    }
  }
  return best;
}

    .filter(ex=>ex.nome&&ex.sets.length);
}

function confirmarSalvar(sess){
  /* recordes precisam ser medidos antes de a sessão entrar no DB */
  const prs=[];
  for(const ex of sess.exercicios){
    const ant=recordeE1rm(ex.nome,sess.id);
    let novo=0;
    for(const x of ex.sets)if(!x.warm)novo=Math.max(novo,e1rm(x.carga,x.reps));
    if(ant>0&&novo>ant+0.05)prs.push({nome:ex.nome,ganho:novo-ant});
  }
  const ant=DB.sessions.filter(s=>s.treinoNome===sess.treinoNome&&s.data<sess.data)
    .sort((a,b)=>b.data.localeCompare(a.data))[0];
  const ton=tonelagemSessao(sess), tonAnt=ant?tonelagemSessao(ant):0;
  const efet=sess.exercicios.reduce((a,ex)=>a+ex.sets.filter(x=>!x.warm).length,0);

  DB.sessions=[sess,...DB.sessions];
  persist();UI.novo=null;render();

  const dias=[...new Set(DB.sessions.map(s=>s.data))].sort();
  const idx=dias.indexOf(sess.data);
  let seq=1;
  for(let i=idx;i>0;i--){const g=(ts(dias[i])-ts(dias[i-1]))/DAY;if(g<=3)seq++;else break}
  const delta=ant?ton-tonAnt:null;
  openModal(`<div class="big">🎉</div>
    <h2 style="text-align:center">Treino salvo!</h2>
    <div class="sub" style="text-align:center">${esc(sess.treinoNome||"Sessão registrada")} · ${brDate(sess.data)}</div>

      <div class="mrow"><span>Séries efetivas</span><b class="num">${efet}</b></div>
      <div class="mrow"><span>Tonelagem</span><b class="num">${fmtT(ton)}</b></div>
      ${ant?`<div class="mrow"><span>vs. ${brDate(ant.data)}</span><b class="num" style="color:${delta>=0?"var(--green)":"var(--red)"}">${delta>=0?"▲ +":"▼ "}${fmtT(Math.abs(delta))}</b></div>`:""}
      <div class="mrow"><span>Total no histórico</span><b class="num">${DB.sessions.length} sessões</b></div>
      ${seq>1?`<div class="mrow"><span>Sequência</span><b class="num">🔥 ${seq} treinos seguidos</b></div>`:""}
    </div>
    ${prs.length?`<div class="pr">🏆 Recorde${prs.length>1?"s":""} de carga estimada:<br>${prs.map(p=>`<b>${esc(p.nome)}</b> +${fmt1(p.ganho)} kg`).join("<br>")}</div>`:""}`,
    [{label:"Fechar",cls:"btn-p",esc:true,fn:()=>{TAB="hist";render()}}]);

  <div class="card">
    <div class="chips">${[["90d","90 dias"],["12m","12 meses"],["2026","2026"],["2025","2025"],["tudo","Tudo"]]
      .map(([id,lb])=>`<button class="chip ${UI.per===id?"on":""}" onclick="quick('${id}')">${lb}</button>`).join("")}</div>
    <div class="row" style="margin-top:8px">
      <input type="date" value="${UI.ini}" onchange="UI.ini=this.value;UI.per=null;render()">
      <input type="date" value="${UI.fim}" onchange="UI.fim=this.value;UI.per=null;render()">
    </div>
  </div>
  <div class="kpis">
    ${kc(S.length,"sessões",dNum(S.length-P.length,"vs ant."))}
    ${kc(fmt1(freqAt),"por semana",dNum(freqAt-freqAnt,"vs ant."))}
    ${kc(fmtT(tonAt),"tonelagem",dPct(dTon,"vs ant."))}
    ${kc(lastM?fmt1(lastM.peso)+" kg":"—","peso",dNum(dPeso,"no per."))}
    ${kc(lastG?fmt1(lastG.gordura)+"%":"—","gordura",dNum(dGord,"no per."))}
    ${kc(mgAt?fmt1(mgAt)+" kg":"—","massa magra",dNum(dMg,"no per."))}
  </div>`;

  /* ─────────────────────────── FORÇA ─────────────────────────── */
  const cnt={};
  for(const s of S)for(const ex of (s.exercicios||[]))
    if((ex.sets||[]).some(x=>!x.warm&&Number(x.carga)>0))cnt[ex.nome]=(cnt[ex.nome]||0)+1;
  const exNames=Object.keys(cnt);
  if(exNames.length){
    if(!UI.exSel||!cnt[UI.exSel])UI.exSel=Object.entries(cnt).sort((a,b)=>b[1]-a[1])[0][0];
    h+=secHead("forca","Força","Progressão por exercício e volume por grupo");
    if(UI.secs.forca!==false){
      const prog=[];
      for(const s of S){let best=null,bestE=null;
        for(const ex of (s.exercicios||[]))if(ex.nome===UI.exSel)
          for(const x of (ex.sets||[]))if(!x.warm&&x.carga>0){
            if(best==null||x.carga>best)best=x.carga;
            const e=e1rm(x.carga,x.reps);if(bestE==null||e>bestE)bestE=e}
        if(best!=null)prog.push({t:ts(s.data),c:best,e:bestE})}
      const dE=prog.length>1?prog[prog.length-1].e-prog[0].e:null;
      /* o seletor era uma lista corrida de dezenas de nomes — agora vai
         separado por grupamento e com a contagem de sessões do período */
      const byG=new Map();
      for(const n of exNames){const g=grupoDe(n);if(!byG.has(g))byG.set(g,[]);byG.get(g).push(n)}
      const opts=ORDEM_G.filter(g=>byG.has(g)).map(g=>
        `<optgroup label="${g}">`+byG.get(g).sort((a,b)=>a.localeCompare(b,"pt-BR",{numeric:true}))
          .map(n=>`<option value="${esc(n)}"${n===UI.exSel?" selected":""}>${esc(n)} · ${cnt[n]}×</option>`).join("")+`</optgroup>`).join("");
      h+=`<div class="card">
        <div class="ch"><b>Progressão de força</b><span class="tag" style="color:${COR_G[grupoDe(UI.exSel)]}">${esc(grupoDe(UI.exSel))}</span></div>
        <select style="margin-top:8px" onchange="UI.exSel=this.value;render()">${opts}</select>
        <div class="sub num" style="margin-top:6px">${cnt[UI.exSel]} sessões no período${dE!=null?` · Δ e1RM <span class="${dE>=0?"up":"down"}">${dE>=0?"+":"−"}${fmt1(Math.abs(dE))} kg</span>`:""}</div>
        ${chart({xTime:true,xs:prog.map(p=>p.t),yFmt:v=>fmt1(v),series:[
          {pts:prog.map(p=>[p.t,p.c]),color:"var(--amber)",dots:prog.length<40},
          {pts:prog.map(p=>[p.t,p.e]),color:"var(--green)",dash:true}]})}
        ${legend([["var(--amber)","carga máx (kg)"],["var(--green)","e1RM estimado (kg)"]])}</div>`;

      /* volume por grupo: atual vs. período anterior */
      const somaG=acc=>arr=>{for(const s of arr)for(const ex of (s.exercicios||[])){
        if(/\[barras\]/i.test(ex.nome))continue;
        const t=(ex.sets||[]).reduce((b,x)=>x.warm?b:b+(Number(x.carga)||0)*(Number(x.reps)||0),0);
        if(t>0){const g=grupoDe(ex.nome);acc[g]=(acc[g]||0)+t}}};
      const vg={},vgP={};somaG(vg)(S);somaG(vgP)(P);
      const gs=Object.entries(vg).sort((a,b)=>b[1]-a[1]);
      if(gs.length){
        const maxG=gs[0][1];
        h+=`<div class="card"><div class="ch"><b>Volume por grupo</b><span class="tag">${fmtT(tonAt)} no período</span></div>
        ${gs.map(([g,v])=>{const p=vgP[g]||0,d=p>0?((v-p)/p)*100:null;
          return `<div class="gbar">
            <span class="gn">${esc(g)}</span>
            <span class="gt"><i style="width:${Math.max(2,v/maxG*100).toFixed(1)}%;background:${COR_G[g]||"var(--faint)"}"></i></span>
            <span class="num gv">${fmtT(v)}</span>
            <span class="num gd ${d==null?"":cls(d)}">${d==null?"—":(d>0?"+":d<0?"−":"")+Math.round(Math.abs(d))+"%"}</span>
          </div>`}).join("")}
        <div class="sub" style="margin-top:9px">% = variação vs. período anterior (${brDate(pIni)} – ${brDate(pFim)})</div></div>`;
      }
    }
  }

  /* ─────────────────────── CONSISTÊNCIA ─────────────────────── */
  h+=secHead("consist","Consistência","Tonelagem semanal e frequência mensal");
  if(UI.secs.consist!==false){
    const wk=new Map();
    /* semanas sem treino entram como zero: senão a média móvel de 4 semanas
       ignora as paradas e o eixo encolhe o tempo parado                     */
    const seg=t=>t-((new Date(t).getDay()+6)%7)*DAY;
    for(let t=seg(ts(UI.ini));t<=ts(UI.fim);t+=7*DAY)wk.set(t,0);
    for(const s of S){const w=seg(ts(s.data));wk.set(w,(wk.get(w)||0)+tonelagemSessao(s))}
    const wkE=[...wk.entries()].sort((a,b)=>a[0]-b[0]);
    if(wkE.length>1){
      const xsW=wkE.map(([t])=>{const d=new Date(t);return `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}`});
      const vals=wkE.map(e=>e[1]);
      const mm=vals.map((_,i)=>{const w=vals.slice(Math.max(0,i-3),i+1);return w.reduce((a,b)=>a+b,0)/w.length});
      const emT=Math.max(...vals)>=1000;               /* unidade única no eixo */
      const yF=emT?(v=>fmt1(v/1000)+" t"):(v=>Math.round(v)+" kg");
      h+=`<div class="card"><div class="ch"><b>Tonelagem semanal</b><span class="tag">média ${fmtT(vals.reduce((a,b)=>a+b,0)/vals.length)}/sem</span></div>
        ${chart({xs:xsW,xLabels:xsW,yFmt:yF,bars:{vals,color:"var(--blue)"},series:[{pts:mm.map((v,i)=>[i,v]),color:"var(--amber)"}]})}
        ${legend([["var(--blue)","semana"],["var(--amber)","média móvel 4 sem."]])}</div>`;
    }
    const fm=new Map();let t=ts(UI.ini);
    while(t<=ts(UI.fim)){const d=new Date(t);const k=`${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getFullYear()).slice(2)}`;
      if(!fm.has(k))fm.set(k,0);d.setMonth(d.getMonth()+1);d.setDate(1);t=d.getTime()}
    for(const s of S){const k=`${s.data.slice(5,7)}/${s.data.slice(2,4)}`;if(fm.has(k))fm.set(k,fm.get(k)+1)}
    const fmK=[...fm.keys()],fmV=[...fm.values()];
    const media=fmV.length?fmV.reduce((a,b)=>a+b,0)/fmV.length:0;
    h+=`<div class="card"><div class="ch"><b>Frequência mensal</b><span class="tag">média ${fmt1(media)}/mês</span></div>
      ${chart({xs:fmK,xLabels:fmK,bars:{vals:fmV,color:"var(--amber)"},series:[{pts:fmK.map((_,i)=>[i,media]),color:"var(--faint)",dash:true}]})}</div>`;
  }

  /* ─────────────────────────── CORPO ─────────────────────────── */
  const comFitas=[...DB.measures].filter(m=>m.fitas&&Object.keys(m.fitas).length).sort((a,b)=>b.data.localeCompare(a.data));
  if(cp.length>1||comFitas.length){
    h+=secHead("corpo","Corpo","Composição corporal e perimetria");
    if(UI.secs.corpo!==false){
      if(cp.length>1){
        h+=`<div class="card"><b>Composição corporal</b>
          <div class="sub" style="margin-top:8px"><span style="color:var(--amber)">●</span> peso (kg)</div>
          ${chart({h:150,xTime:true,xs:cp.map(m=>ts(m.data)),yFmt:v=>fmt1(v),series:[{pts:cp.map(m=>[ts(m.data),m.peso]),color:"var(--amber)",dots:cp.length<40}]})}
          <div class="sub" style="margin-top:10px"><span style="color:var(--green)">●</span> gordura (%)</div>
          ${chart({h:150,xTime:true,xs:cg.map(m=>ts(m.data)),yFmt:v=>fmt1(v),series:[{pts:cg.map(m=>[ts(m.data),m.gordura]),color:"var(--green)",dots:cg.length<40}]})}</div>`;
      }
      if(comFitas.length){
        const atual=comFitas[0],ant=comFitas[1];
        h+=`<div class="card"><div class="ch"><b>Perimetria</b><span class="tag num">${brDate(atual.data)}${ant?` vs ${brDate(ant.data)}`:""}</span></div>
        <table><tr><th>Medida</th><th style="text-align:right">Atual</th><th style="text-align:right">Δ</th></tr>
        ${Object.keys(atual.fitas).map(k=>{const a=atual.fitas[k],b=ant?.fitas?.[k],d=b!=null?a-b:null;
          return `<tr><td>${esc(k)}</td><td class="num" style="text-align:right">${fmt1(a)} cm</td>
          <td class="num ${d?cls(d):""}" style="text-align:right">${d==null?"—":d===0?"=":seta(d)+fmt1(Math.abs(d))}</td></tr>`}).join("")}
        </table></div>`;
      }
    }
  }
  return h;
}

/* ============================ aba Medidas ============================ */
function vMed(){
  const ord=[...DB.measures].sort((a,b)=>b.data.localeCompare(a.data));
  const nm=UI.novaMed;
  let h=`<h1>Medidas</h1>
  <div class="card"><b>Novo registro</b>
    <span class="lbl">Data</span><input type="date" value="${nm.data}" onchange="UI.novaMed.data=this.value">
    <div class="row" style="margin-top:8px">
      <div><span class="lbl">Peso (kg)</span><input inputmode="decimal" value="${esc(nm.peso)}" onchange="UI.novaMed.peso=this.value"></div>
      <div><span class="lbl">Gordura (%)</span><input inputmode="decimal" value="${esc(nm.gordura)}" onchange="UI.novaMed.gordura=this.value"></div>
    </div>
    <button class="btn-p" style="width:100%;margin-top:12px" onclick="salvarMedida()">Salvar medida</button>
  </div>`;
  if(ord.length){
    h+=`<div class="card"><b>Registros</b>`;
    ord.slice(0,15).forEach(m=>{
      h+=`<div class="sess" style="cursor:default"><div class="t"><span class="num">${m.peso!=null?fmt1(m.peso)+" kg":"—"}${m.gordura!=null?` · ${fmt1(m.gordura)}%`:""}</span><span class="d num">${brDate(m.data)}</span></div>
      <button class="btn-danger" style="margin-top:4px;font-size:12px;padding:4px 8px" onclick="apagarMed('${m.id}')">apagar</button></div>`;
    });
    h+=`</div>`;
  }
  return h;
}
window.salvarMedida=()=>{
  const nm=UI.novaMed;
  if(!nm.peso&&!nm.gordura){flash("Preencha ao menos o peso");return}
  DB.measures=[{id:`m-${nm.data}-${uid().slice(0,4)}`,data:nm.data,peso:Number(nm.peso)||null,gordura:Number(nm.gordura)||null,fitas:{}},...DB.measures];
  persist();UI.novaMed={data:todayISO(),peso:"",gordura:""};flash("Medida salva ✓");render();
};
window.apagarMed=id=>{DB.measures=DB.measures.filter(m=>m.id!==id);persist();flash("Registro apagado");render()};

/* ============================ aba Backup ============================ */
function vBkp(){
  return `<h1>Backup</h1>
  <div class="card"><b>Importar histórico</b>
    <div class="sub" style="margin-top:4px">Carregue o backup .json exportado do App antigo (ou deste app). Os dados ficam salvos neste aparelho.</div>
    <button class="btn-p" style="width:100%;margin-top:12px" onclick="document.getElementById('fileIn').click()">⬆ Importar backup .json</button>
    <input id="fileIn" type="file" accept=".json,application/json" style="display:none" onchange="if(this.files[0])importFile(this.files[0]);this.value=''">
  </div>
  <div class="card"><b>Exportar backup</b>
    <div class="sub" style="margin-top:4px">Gera o arquivo com todas as sessões, medidas e plano — guarde no iCloud/Arquivos de tempos em tempos.</div>
    <button style="width:100%;margin-top:12px" onclick="download('backup-treino-'+todayISO()+'.json',JSON.stringify(exportPayload(),null,1));flash('Backup exportado ✓')">⬇ Exportar backup .json</button>
  </div>
  <div class="card"><b>Enviar para o Claude</b>
    <div class="sub" style="margin-top:4px">Gera um arquivo único com o código completo do app + todos os seus dados. Anexe esse arquivo num chat do Claude e peça os ajustes que quiser — o Claude devolve o app atualizado.</div>
    <button style="width:100%;margin-top:12px;border-color:var(--amber);color:var(--amber)" onclick="enviarParaClaude()">✦ Enviar para o Claude</button>
  </div>
  <div class="card"><span class="sub num">Neste aparelho: ${DB.sessions.length} sessões · ${DB.measures.length} medidas${DB.plan?" · plano salvo":""}</span></div>`;
}

/* ============================ shell ============================ */
const TABS=[["treino","🏋️","Treino"],["hist","🗓","Histórico"],["dash","📈","Dashboard"],["med","⚖️","Medidas"],["bkp","💾","Backup"]];
function render(){
  const views={treino:vTreino,hist:vHist,dash:vDash,med:vMed,bkp:vBkp};
  $("#app").innerHTML=views[TAB]();
  $("#nav").innerHTML=TABS.map(([id,ic,lb])=>`<button class="${TAB===id?"on":""}" onclick="TAB='${id}';render()"><span class="ic">${ic}</span>${lb}</button>`).join("");
}
window.render=render;window.UI=UI;window.importFile=importFile;window.enviarParaClaude=enviarParaClaude;window.download=download;window.exportPayload=exportPayload;window.todayISO=todayISO;window.normNome=normNome;window.closeModal=closeModal;window.esc=esc;
render();
</script>
</body>
